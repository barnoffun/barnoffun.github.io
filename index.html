<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barn of Fun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0ece3;
      --fg: #1a1a18;
      --fg-muted: rgba(26,26,24,0.45);
      --border: rgba(26,26,24,0.15);
      --input-bg: rgba(26,26,24,0.05);
      --btn-bg: #1a1a18;
      --btn-fg: var(--bg);
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 3rem 1.5rem 4rem;
      transition: background-color 0.3s ease;
    }

    header {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      flex: 1;
      justify-content: center;
    }

    @keyframes flyUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-110vh) rotate(20deg); opacity: 1; }
    }

    .fly-item {
      position: fixed;
      width: 65px;
      height: auto;
      max-width: 65px;
      pointer-events: none;
      animation: flyUp 1.8s ease-in forwards;
      z-index: 999;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .spin-img {
      width: auto;
      height: auto;
      max-width: 120px;
      max-height: 120px;
      object-fit: contain;
      cursor: pointer;
      display: block;
    }

    .spin-img.spinning {
      animation: spin 0.3s ease-in-out;
    }
    
    .image-placeholder {
      width: 100%;
      max-width: 480px;
      aspect-ratio: 16 / 9;
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      color: var(--fg-muted);
      font-size: 0.85rem;
      font-weight: 300;
    }

    footer {
      width: 100%;
      max-width: 420px;
      padding-top: 3rem;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }

    .footer-label {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--fg-muted);
    }

    .footer-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 6px;
    }

    .footer-row input[type="email"] {
      width: 225px;
      padding: 0 1rem;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--input-bg);
      color: var(--fg);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .footer-row input[type="email"]::placeholder {
      color: var(--fg-muted);
    }

    .footer-row input[type="email"]:focus {
      border-color: var(--fg);
    }

    .footer-row button {
      height: 36px;
      padding: 0 1.2rem;
      background: var(--btn-bg);
      color: var(--btn-fg);
      border: none;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    .footer-row button:hover { opacity: 0.8; }
    .footer-row button:active { opacity: 0.6; }

    .footer-fine {
      font-size: 0.7rem;
      color: var(--fg-muted);
    }

    .footer-success {
      display: none;
      font-size: 0.9rem;
      color: var(--fg-muted);
    }
  </style>
</head>
<body>

  <header>
   <img src="clown.png" alt="" class="spin-img" id="spin-img" />
   <img src="barn_logo.png" alt="Barn of Fun" style="max-width: 480px; width: 100%; border-radius: 10px;" />
  </header>

  <footer>
    <p class="footer-label">Join the Fun</p>
    <div class="footer-row">
      <input type="email" id="email-input" placeholder="your@email.com" autocomplete="email" />
      <button id="submit-btn">Submit</button>
    </div>
    <p class="footer-success" id="success-msg">Keep collecting prize tickets, we'll be in touch.</p>
    <p class="footer-fine">No spam (or manure), unsubscribe any time.</p>
  </footer>

  <script>
const colors = [
  // Pastel: 9FD05E, 9F8EC7, 65C9E7, F9CED6, F4DA79, 6ABCBE, Color Match: 8F192E, 9A2B8E, FCD54A, 8DBD29, Bold: B53C92, E16C88
  { bg: '#9FD05E', fg: '#1e3a05' },
  { bg: '#9F8EC7', fg: '#1e1540' },
  { bg: '#65C9E7', fg: '#022e38' },
  { bg: '#F9CED6', fg: '#3d0e1a' },
  { bg: '#F4DA79', fg: '#3a2a00' },
  { bg: '#6ABCBE', fg: '#022e2f' },
  { bg: '#8F192E', fg: '#fdf0f3' },
  { bg: '#9A2B8E', fg: '#fdf0fe' },
  { bg: '#FCD54A', fg: '#3a2a00' },
  { bg: '#8DBD29', fg: '#1e3a05' },
  { bg: '#B53C92', fg: '#fdf0f8' },
  { bg: '#E16C88', fg: '#3d0e1a' },
];

let currentIndex = Math.floor(Math.random() * colors.length);

function applyColor(index) {
  const chosen = colors[index];
  document.documentElement.style.setProperty('--bg', chosen.bg);
  document.documentElement.style.setProperty('--fg', chosen.fg);
  document.documentElement.style.setProperty('--fg-muted', chosen.fg + '73');
  document.documentElement.style.setProperty('--border', chosen.fg + '26');
  document.documentElement.style.setProperty('--input-bg', chosen.fg + '0d');
  document.documentElement.style.setProperty('--btn-bg', chosen.fg);
  document.documentElement.style.setProperty('--btn-fg', chosen.bg);
}

applyColor(currentIndex);

document.getElementById('spin-img').addEventListener('click', function() {
  const available = colors.map((_, i) => i).filter(i => i !== currentIndex);
  currentIndex = available[Math.floor(Math.random() * available.length)];
  applyColor(currentIndex);
  this.classList.add('spinning');
  this.addEventListener('animationend', () => {
    this.classList.remove('spinning');
  }, { once: true });
});

function launchImage(rect) {
  const el = document.createElement('img');
  el.src = 'balloon.png';
  el.classList.add('fly-item');
  el.style.position = 'fixed';
  el.style.left = (rect.left + rect.width / 2 - 32) + 'px';
  el.style.bottom = '0px';
  el.style.top = 'auto';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

document.getElementById('submit-btn').addEventListener('click', function() {
  const input = document.getElementById('email-input');
  if (!input.value || !input.checkValidity()) {
    input.reportValidity();
    return;
  }
  const rect = this.getBoundingClientRect();
  document.querySelector('.footer-row').style.display = 'none';
  document.getElementById('success-msg').style.display = 'block';
  launchImage(rect);
});
  </script>
</body>
</html>
